name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # smaug is an MCP server run on Linux/macOS (WSL); the Windows legs failed
        # on environmental issues (external `bird` CLI + path handling), not real
        # bugs — they were CI noise, not signal. Re-add + fix the tests if Windows
        # becomes a real target.
        os: [ubuntu-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
