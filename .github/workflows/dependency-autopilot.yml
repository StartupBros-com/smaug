name: Dependency Autopilot
# Thin caller — all logic lives in StartupBros-com/shared-workflows.
# Fires when this repo's CI finishes on a Dependabot PR: green -> auto-merge,
# red -> Codex auto-fix (where creds are available).
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
  actions: read
jobs:
  autopilot:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    uses: StartupBros-com/shared-workflows/.github/workflows/dependency-autopilot.yml@main
    with:
      ci_conclusion: ${{ github.event.workflow_run.conclusion }}
      pr_branch:     ${{ github.event.workflow_run.head_branch }}
      ci_run_id:     ${{ github.event.workflow_run.id }}
      ecosystem:     npm
    secrets: inherit
