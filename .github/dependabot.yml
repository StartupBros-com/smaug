# Dependabot opener for the dependency autopilot.
# Security-update PRs are enabled at the repo level; this adds grouped VERSION
# updates. Patch+minor grouped to keep noise low; majors come individually.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "github-actions"]
